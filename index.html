<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeQuote | Feel the Emotion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .anime-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-600/20 rounded-full blur-[120px]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>

    <main class="max-w-2xl w-full z-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold tracking-tighter mb-2 bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent">
                ANIMECHAN.
            </h1>
            <p class="text-slate-400 mono text-sm uppercase tracking-widest">Random Quote Generator</p>
        </header>

        <div class="glass p-8 md:p-12 rounded-3xl shadow-2xl relative overflow-hidden group">
            <div id="loader" class="hidden absolute inset-0 bg-slate-900/50 flex items-center justify-center z-20">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-pink-500"></div>
            </div>

            <div class="relative z-10">
                <span class="text-6xl text-pink-500/30 absolute -top-4 -left-4 font-serif">“</span>
                
                <p id="quote-text" class="text-xl md:text-2xl leading-relaxed font-light italic mb-8">
                    Click the button to summon wisdom from the multiverse...
                </p>

                <div class="flex items-center gap-4">
                    <div class="h-[2px] w-12 bg-pink-500"></div>
                    <div>
                        <h3 id="character-name" class="text-lg font-bold text-white tracking-wide uppercase">---</h3>
                        <p id="anime-name" class="text-sm text-pink-400 mono italic">Waiting for input...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 flex justify-center">
            <button onclick="fetchQuote()" 
                class="group relative px-8 py-4 font-bold text-white transition-all duration-300">
                <div class="absolute inset-0 bg-gradient-to-r from-pink-600 to-violet-600 rounded-xl blur opacity-75 group-hover:opacity-100 transition duration-1000"></div>
                <div class="relative bg-slate-900 px-8 py-4 rounded-xl leading-none flex items-center divide-x divide-gray-600 hover:bg-slate-800 transition-all">
                    <span class="pr-6">New Quote</span>
                    <span class="pl-6 text-pink-400 group-hover:text-pink-300 transition duration-200">Next &rarr;</span>
                </div>
            </button>
        </div>
    </main>

    <script>
        async function fetchQuote() {
    const quoteEl = document.getElementById('quote-text');
    const charEl = document.getElementById('character-name');
    const animeEl = document.getElementById('anime-name');
    const loader = document.getElementById('loader');

    loader.classList.remove('hidden');

    try {
        const response = await fetch('http://joyful-motivation-production.up.railway.app/quote');
        const data = await response.json();

        quoteEl.innerText = data.quote;
        charEl.innerText = data.character;
        animeEl.innerText = data.anime;
    } catch (error) {
        quoteEl.innerText = "Failed to fetch from your backend. Is FastAPI running?";
        charEl.innerText = "---";
        animeEl.innerText = "---";
        console.error(error);
    } finally {
        loader.classList.add('hidden');
    }
}
    </script>
</body>
</html>
